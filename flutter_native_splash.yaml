flutter_native_splash:
  color: "#ffffff"
  color_dark: "#ffffff"

  # 1. Center Icon: Standalone graphic, NO text (fits circular mask)
  image: assets/emblem_square.png

  # 2. Branding: Full logo with text at the bottom
  branding: assets/branding.png
  branding_dark: assets/branding.png

  android: true
  ios: true
  fullscreen: true

  # 3. Android 12+ specific configuration
  android_12:
    image: assets/emblem_square.png
    branding: assets/branding.png
    color: "#ffffff"
    color_dark: "#ffffff"
    icon_background_color: "#ffffff"
    icon_background_color_dark: "#ffffff"

  android_gravity: center
  ios_content_mode: center
